name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Display Files
        run: ls -la

      - name: HTML Validation
        run: |
          sudo npm install -g htmlhint
          htmlhint *.html

      - name: Build Stage
        run: echo "Static HTML project - No build required"

      - name: Deploy Stage
        run: echo "Deployment step here"
